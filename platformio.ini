; POSEIDON — Keyboard-first pentesting firmware for M5Stack Cardputer-Adv.
;
; Target hardware: M5Stack Cardputer-Adv (K126-Adv)
;   ESP32-S3 @ 240 MHz, 8MB PSRAM, 8MB flash
;   1.14" LCD 240x135 (ST7789v2), TCA8418 I2C keyboard matrix
;   IR LED, microSD, I2S speaker, PDM mic, USB-C, Grove I2C
;   Keyboard on I2C frees GPIO 3/4/5/6/7/13/15 for hats (LoRa1262, etc).

[env:cardputer]
; pioarduino 55.03.38 (Arduino 3.3.8 / IDF 5.5.4) + Bruce's patched WiFi libs.
; Required for deauth frames to land on-air — stock IDF 5.3 blob filters
; subtypes 0xC/0xA regardless of TX path. Bruce uses this exact stack.
; Rollback: cp platformio.ini.stable platformio.ini
platform              = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
; Use Bruce's pinned lib build (20260123) not the latest. The 20260407 zip
; still has `unsupport frame type` filter in libnet80211.a — on-device tests
; returned rc=258 with that build. 20260123 is what Bruce's own platformio.ini
; uses and what we know works.
platform_packages     = framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20260123-153546.zip
board                 = m5stack-stamps3
framework             = arduino
monitor_speed         = 115200
upload_speed          = 460800
upload_flags =
    --no-stub

; PSRAM is broken on this particular Cardputer unit — ID reads back as
; 0xffffff or 0x0 regardless of qio_opi/qio_qspi. Disabling entirely so
; no code path (BLE, slide transitions, etc.) assumes PSRAM exists.
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    -DPOSEIDON_VERSION=\"0.6.5\"
    -std=gnu++17
    -Wall
    ; Override libnet80211.a's ieee80211_raw_frame_sanity_check (which
    ; filters deauth/disassoc subtypes) with our stub in
    ; src/features/wifi_sanity_override.cpp. -zmuldefs is the correct
    ; flag for "object file wins over archive". The previous
    ; --allow-multiple-definition is order-dependent — the linker just
    ; picks the first symbol it sees during scan and which one that is
    ; depends on alphabetical ordering of object files vs --start-group
    ; archive ordering. Bruce/Marauder/Porkchop all use -zmuldefs.
    -Wl,-zmuldefs

build_unflags = -std=gnu++11

lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    m5stack/M5Unified   @ ^0.2.13
    ; NimBLE 2.x required for IDF 5.5 (1.4.1 crashes at BLE init on Core 3.3.8)
    h2zero/NimBLE-Arduino @ ^2.3.9
    marian-craciunescu/ESP32Ping @ ^1.7
    jgromes/RadioLib @ 7.4.0
    ; Swapped from lsatan/SmartRC-CC1101-Driver-Lib to Bruce's fork
    ; (bmorcelli). The upstream 2.5.7 lib has no setSPIinstance() +
    ; bit-bangs MISO in Reset() which hangs forever on Arduino-ESP32
    ; 3.x (MISO is in SPI peripheral mode → digitalRead unreliable).
    ; Bruce's fork exposes setSPIinstance() so we can reuse SD's HSPI
    ; and skip SpiStart's SPI.begin() that triggers the mode conflict.
    ; Pinned to a specific commit so a future force-push to bmorcelli's
    ; main branch can't silently break our build. Bump deliberately when
    ; we want their newer fixes; verify on hardware before committing.
    https://github.com/bmorcelli/SmartRC-CC1101-Driver-Lib#7bba5217dc0632f718a3278dc27e401016741a95
    sui77/rc-switch @ ^2.6.4
    nrf24/RF24 @ ^1.4.11
    sparkfun/SparkFun SGP4 Arduino Library @ ^1.0.1
    ; Phone Bridge libs disabled — AsyncTCP + ESPAsyncWebServer + QRCode
    ; pulled enough runtime heap pressure that Triton crashed with
    ; "Arduino Event Malloc Failed" when WiFi tried to post an event.
    ; Source files moved to *.disabled so they're preserved for a future
    ; rebuild under a build flag with proper heap-budget gates.
    ; ; https://github.com/mathieucarbou/AsyncTCP
    ; ; https://github.com/mathieucarbou/ESPAsyncWebServer
    ; ; https://github.com/ricmoo/QRCode

monitor_filters = esp32_exception_decoder, colorize

; ---------------------------------------------------------------------------
; Launcher-compatible build. Produces a firmware.bin that drops into
; bmorcelli/Launcher's app1/ota_0 slot at 0x170000. The app is linked at
; that offset and capped at 0x4F0000 (~4.94 MB) via launcher_8Mb.csv.
;
; Install path: user flashes bmorcelli's Launcher first (web flasher or
; M5Burner), puts our firmware.bin on SD or uploads via Launcher's WebUI,
; and picks "Install from SD". From inside POSEIDON: Settings -> [L] back
; to Launcher uses esp_ota_set_boot_partition(APP_TEST) + ESP.restart().
;
; Everything else (build_flags, lib_deps, platform, etc.) inherits from
; [env:cardputer] via `extends`. Only the partition table differs.
[env:cardputer-launcher]
extends               = env:cardputer
board_build.partitions = support_files/launcher_8Mb.csv

; OTA upload env — same build as cardputer, different upload protocol.
; Push with:
;   pio run -e cardputer-ota -t upload --upload-port <device-ip>
; (password is baked in via upload_flags so we don't repeat it each time)
[env:cardputer-ota]
extends               = env:cardputer
upload_protocol       = espota
upload_flags          = --auth=poseidon
